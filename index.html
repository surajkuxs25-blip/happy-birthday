<!DOCTYPE html>
<html>
<head>
<title>Secret Surprise 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial;
}

/* 3D Card */
.card {
    width: 300px;
    height: 200px;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    transition: transform 1s;
    transform-style: preserve-3d;
}

.card:hover .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 20px;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.front {
    background: white;
}

.back {
    background: pink;
    transform: rotateY(180deg);
}

input {
    padding: 8px;
    margin-top: 10px;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
<div class="inner">

<div class="front">
<h2>💖 Tap Me 💖</h2>
<p>Secret Surprise 🎁</p>
</div>

<div class="back">
<h3>Enter Password 🔐</h3>
<input type="password" id="pass">
<button onclick="check()">Open</button>
</div>

</div>
</div>

<script>
function check() {
    let p = document.getElementById("pass").value;
    if(p === "anjali") {
        window.location.href = "surprise.html";
    } else {
        alert("Wrong Password ❌");
    }
}
</script>

</body>
</html>
