<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Anjali Aunty 🎂</title>

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    background: radial-gradient(circle,#ff758c,#ff7eb3);
    overflow: hidden;
}

h1 {
    color: white;
}

/* Image */
img {
    width: 250px;
    height: 250px;
    border-radius: 50%;
    border: 6px solid white;
    object-fit: cover;
}

/* Text */
#text {
    color: white;
    font-size: 22px;
    margin-top: 15px;
    padding: 0 20px;
}

/* Buttons */
button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    background: white;
    border-radius: 10px;
    cursor: pointer;
}

/* Cake */
#cake {
    font-size: 50px;
    display: none;
    animation: pop 1s ease;
}

@keyframes pop {
    0% {transform: scale(0);}
    100% {transform: scale(1);}
}

/* Gift */
#giftBox {
    font-size: 50px;
    cursor: pointer;
}

#giftMsg {
    color: white;
    font-size: 22px;
}

/* Hearts */
.heart {
    position: fixed;
    animation: float 5s linear infinite;
}
@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* Fireworks */
.fire {
    position: fixed;
    width: 6px;
    height: 6px;
    background: yellow;
    border-radius: 50%;
    animation: explode 1s linear;
}
@keyframes explode {
    from {transform: scale(1);}
    to {transform: scale(25); opacity: 0;}
}
</style>

</head>

<body>

<h1>🎉 Happy Birthday Anjali Aunty 🎂</h1>

<img id="slide" src="photo1.jpg.jpeg">

<p id="text"></p>

<!-- Cake Button -->
<button onclick="cutCake()">🎂 Cake Cut Kare</button>
<p id="cake">🎂✨ Happy Birthday ✨🎂</p>

<!-- Gift Box -->
<p id="giftBox" onclick="openGift()">🎁</p>
<p id="giftMsg"></p>

<!-- Secret -->
<button onclick="secret()">💌 Special Message</button>
<p id="secretText"></p>

<script>
// Slideshow FIXED
let images = ["photo1.jpg.jpeg","photo2.jpg.jpeg","photo3.jpg.jpeg"];
let i = 0;
setInterval(()=>{
    i = (i+1)%images.length;
    document.getElementById("slide").src = images[i];
},2000);

// Typing message
let msg = "💖 Anjali Aunty, aap hamare liye bahut special ho 💖\nAapka pyaar aur care sabko khush rakhta hai 😊\nBhagwan aapko hamesha sehat aur khushi de 🙏\nHappy Birthday 🎉✨";
let j = 0;

function type(){
    if(j < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(j);
        j++;
        setTimeout(type,40);
    }
}
type();

// Cake cut
function cutCake(){
    document.getElementById("cake").style.display="block";
}

// Gift open
function openGift(){
    document.getElementById("giftMsg").innerHTML =
    "🎁 Surprise! Aap duniya ki sabse pyari aunty ho 💖";
}

// Secret message
function secret(){
    document.getElementById("secretText").innerHTML =
    "💌 Aapki smile sabse beautiful hai 😊 Hamesha aise hi khush rahiye 💖";
}

// Hearts
setInterval(()=>{
    let h = document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},300);

// Fireworks click
document.addEventListener("click",(e)=>{
    let f=document.createElement("div");
    f.className="fire";
    f.style.left=e.clientX+"px";
    f.style.top=e.clientY+"px";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
});
</script>

</body>
</html>
